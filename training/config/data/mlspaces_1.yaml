# @package _global_
# Data config for mlspaces-1 experiment reproduction.
# Matches the original mlspaces-1 config exactly (no full_frame_dropout,
# no random_seq_len, centroid crop anchor, max_samples=30000 for both).

data:
  train:
    _target_: training.data.composed_dataset.ComposedDataset
    datasets:
      - _target_: cotracker.datasets.kubric_movif_dataset.KubricMovifDataset
        data_root: ${evaluation.dataset_root}/cotracker3_kubric
        crop_size: ${model.model_resolution}
        seq_len: ${training.sequence_len}
        traj_per_sample: ${training.traj_per_sample}
        sample_vis_last_frame: false
        use_augs: true
        random_seq_len: false
        random_first_frame: false
        random_frame_rate: true
        random_number_traj: false
        only_first: ${training.query_sampling_method}
        split: train
        max_samples: 30000
        spatial_crop_anchor: centroid
      - _target_: cotracker.datasets.molmospaces_dataset.MolmoSpacesDataset
        data_root: 
        crop_size: ${model.model_resolution}
        seq_len: ${training.sequence_len}
        traj_per_sample: ${training.traj_per_sample}
        sample_vis_last_frame: false
        use_augs: true
        random_seq_len: false
        random_first_frame: false
        random_frame_rate: true
        random_number_traj: false
        only_first: ${training.query_sampling_method}
        split: train
        max_samples: 30000
        cameras: null
        min_visible_frames: 5
        spatial_crop_anchor: centroid
    repeat: 4
